name: Supabase Keep-Alive

on:
  schedule:
    # ogni 3 giorni alle 08:00 UTC
    - cron: '0 8 */3 * *'
  workflow_dispatch: # permette lancio manuale dal tab Actions

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/videos?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Keep-alive fallito con status $STATUS"
            exit 1
          fi
          echo "Keep-alive OK"
